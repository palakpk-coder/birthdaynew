.view.active { display: flex !important; }
 padding: 2rem; position: relative; }

    .balloon::after { content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 1px; height: 20px; background: rgba(0,0,0,0.25); }
    @keyframes floatUp {
      0%   { transform: translateX(0) translateY(0) rotate(0deg); opacity: 0.9; }

      50%  { transform: translateX(-10px) translateY(-50vh) rotate(-3deg); }

<script>
/* CONFETTI */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
 
let confettiPieces = [];
let confettiActive = false;
let confettiTimer = null;
const COLORS = ['#e8587a','#9b5fcf','#ffd700','#f9a8d4','#c4b5fd','#fb923c','#fde68a','#e5b3a3'];
 
function spawnConfetti(count = 120) {
  for (let i = 0; i < count; i++) {
    confettiPieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.3 - 20,
      w: Math.random() * 10 + 6,
      h: Math.random() * 5 + 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 2,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 6,
      life: 1
    });
  }
}
 
function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiPieces = confettiPieces.filter(p => p.life > 0.01);
  confettiPieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.vy += 0.08;
    if (p.y > canvas.height * 0.85) p.life -= 0.02;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle * Math.PI / 180);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
  if (confettiPieces.length > 0 || confettiActive) requestAnimationFrame(animateConfetti);
}
 
function startContinuousConfetti() {
  confettiActive = true;
  spawnConfetti(100);
  animateConfetti();
  confettiTimer = setInterval(() => { if (confettiActive) spawnConfetti(40); }, 800);
}
 
function stopConfetti() {
  confettiActive = false;
  clearInterval(confettiTimer);
  confettiPieces = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
 
/* BALLOONS */
const balloonColors = ['#f9a8d4','#c4b5fd','#fb923c','#fde68a','#e5b3a3','#a5f3fc','#86efac'];
function createBalloons() {
  const container = document.getElementById('balloonsContainer');
  container.innerHTML = '';
  for (let i = 0; i < 18; i++) {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.cssText = `left:${Math.random()*100}%;width:${40+Math.random()*25}px;height:${50+Math.random()*30}px;background:${balloonColors[Math.floor(Math.random()*balloonColors.length)]};animation-duration:${6+Math.random()*6}s;animation-delay:${Math.random()*5}s;`;
    container.appendChild(b);
  }
}
 
/* STARS */
function createStars() {
  const c = document.getElementById('starsContainer');
  c.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    c.appendChild(s);
  }
}
 
/* HEART SHIMMERS */
function createHearts() {
  const c = document.getElementById('heartsContainer');
  c.innerHTML = '';
  const emojis = ['💕','💗','💖','💝','✨','💫','🌸'];
  for (let i = 0; i < 25; i++) {
    const h = document.createElement('div');
    h.className = 'heart-shimmer';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.cssText = `left:${Math.random()*100}%;top:${20+Math.random()*60}%;font-size:${0.8+Math.random()*1.2}rem;animation-duration:${5+Math.random()*6}s;animation-delay:${Math.random()*6}s;`;
    c.appendChild(h);
  }
}
 
/* LOVE HEARTS */
function animateLoveHearts() {
  const c = document.getElementById('loveHearts');
  if (!c) return;
  c.querySelectorAll('.lh').forEach((h, i) => { h.style.animationDuration = (2 + i * 0.6) + 's'; });
}
 
/* GALAXY + PETALS */
function createGalaxy() {
  const c = document.getElementById('galaxyContainer');
  c.innerHTML = '';
  for (let i = 0; i < 120; i++) {
    const d = document.createElement('div');
    d.className = 'galaxy-dot';
    const size = Math.random() * 2.5 + 0.5;
    d.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;opacity:${Math.random()*0.7+0.1};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(d);
  }
}
 
function createPetals() {
  const c = document.getElementById('petalsContainer');
  c.innerHTML = '';
  const petals = ['🌸','🌺','✨','💮','🌹'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.cssText = `left:${Math.random()*100}%;font-size:${0.7+Math.random()*0.8}rem;animation-duration:${8+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
    c.appendChild(p);
  }
}
 
/* NAVIGATION */
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  window.scrollTo(0, 0);
}
 
function goToGifts() {
  stopConfetti();
  showView('gift-view');
  createStars();
  createHearts();
  animateLoveHearts();
}
 
function goToGallery() {
  showView('gallery-view');
  createGalaxy();
  createPetals();
}
 
function goBack(viewId) {
  stopConfetti();
  showView(viewId);
  if (viewId === 'hero-view') {
    createBalloons();
    startContinuousConfetti();
  } else if (viewId === 'gift-view') {
    createStars();
    createHearts();
    animateLoveHearts();
  }
}
 
/* CAKE */
let blown = false;
document.getElementById('cakeWrap').onclick = function () {
  if (blown) return;
  blown = true;
  document.querySelectorAll('.flame').forEach(f => f.classList.add('out'));
  document.getElementById('cakeHint').textContent = 'Wish Made! ✨';
  document.getElementById('cakeHint').style.cssText = 'color:#9b5fcf;font-weight:bold;font-size:1rem;';
};
 
/* GIFTS */
function openGift(num) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  overlay.style.display = 'flex';
  spawnConfetti(80);
  if (!confettiActive) animateConfetti();
  if (num === 1) {
    content.innerHTML = `<h3>Dear Srujan, 💌</h3><p style="margin-top:0.5rem;">My cute big baby I love You. Thank you for always being there. You are my happy place. 🌟</p>`;
  } else if (num === 2) {
    content.innerHTML = `<h3>Sruju's Birthday Coupon 🤗</h3><br><div class="coupon-card">ADMIT ONE: GIANT HUG 🤗<br><small>Redeemable upon meeting!</small></div><p style="margin-top:1rem;font-size:0.8rem;text-align:center;color:#888;">Valid forever. No arguments allowed during redemption.</p>`;
  } else if (num === 3) {
    content.innerHTML = `<h3>Surprise! 🎁</h3><p style="margin-top:0.5rem;">Wait... you have <b>Palak</b> now. What else were you even expecting? That's the jackpot! 😂❤️</p>`;
  }
}
 
function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}
 
/* INIT */
createBalloons();
startContinuousConfetti();
</script>
</body>
</html>
